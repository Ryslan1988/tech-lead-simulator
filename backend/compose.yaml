services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: techleadsim
      POSTGRES_USER: techleadsim
      POSTGRES_PASSWORD: techleadsim
    ports:
      - "5432:5432"
    volumes:
      # Named volume so game data survives `docker compose down` and restarts.
      - techleadsim-db-data:/var/lib/postgresql/data

volumes:
  techleadsim-db-data:
