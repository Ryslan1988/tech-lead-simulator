spring.application.name=tech-lead-simulator

# Datasource (Spring environment variables override the local defaults on Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/techleadsim}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:techleadsim}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:techleadsim}

# JPA — schema owned by Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# All REST endpoints live under /api
server.servlet.context-path=/api
server.port=${PORT:8080}

# Frontend origin (set CORS_ALLOWED_ORIGIN to the Render Static Site URL)
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
